  <text x="165.000" y="683.000" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#475569;">biological Trp T2, O.21 host geometry, O.23 protected subspace, and O.34 reset remain experimental closures.</text>
