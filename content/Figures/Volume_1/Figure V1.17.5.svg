  <text x="560.000" y="100.000" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#475569;">Trp singlet/triplet dynamics are sampled by spin-selective recombination near the 100 MHz scale.</text>
