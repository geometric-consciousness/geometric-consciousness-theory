<text x="82" y="185.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#333333" text-anchor="start">Axiom of Presence:</text>
<text x="82" y="200.86" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#333333" text-anchor="start">experience exists.</text>
<text x="82" y="216.72" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#333333" text-anchor="start">Axiom of Intelligibility:</text>
<text x="82" y="232.57999999999998" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#333333" text-anchor="start">experience is structured.</text>
