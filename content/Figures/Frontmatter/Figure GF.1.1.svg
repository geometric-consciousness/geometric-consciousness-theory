<text x="296" y="499" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f1f1f" text-anchor="start">Tier 2</text>
<text x="296" y="523.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">Geometric consequences derived inside the 6D -&gt; 3D icosahedral cut-</text>
<text x="296" y="540.08" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">and-project ansatz.</text>
<text x="296" y="558.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">Example: Bare Weinberg angle: sine squared theta W equals inverse cubic</text>
<text x="296" y="573.34" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">phi; endpoint audit uses A2 separately.</text>
