<text x="188" y="171" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f1f1f" text-anchor="start">Tier 1</text>
<text x="188" y="195.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">Structural axioms or logical necessities that anchor the framework.</text>
<text x="188" y="230.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">Example: Wheeler-DeWitt constraint H Psi equals zero; lattice action</text>
<text x="188" y="245.34" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">postulate hbar hat equals one.</text>
