<text x="350" y="687.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">Phenomenological or calibrated rows whose first-principles closure</text>
<text x="350" y="704.08" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">remains open.</text>
<text x="350" y="722.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">Example: Biological lag tau lag; PMNS mixing angles carried as a 4.09</text>
<text x="350" y="737.34" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">sigma tension.</text>
