<text x="404" y="851.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">Exploratory calculations or ontological extensions outside the core</text>
<text x="404" y="868.08" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">falsifiable theory.</text>
<text x="404" y="886.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">Example: Identity persistence across bodies; absolute neutrino mass</text>
<text x="404" y="901.34" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">normalization.</text>
