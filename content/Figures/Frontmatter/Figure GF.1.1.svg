<text x="242" y="359.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">Uniqueness-justified structural postulates: architectural</text>
<text x="242" y="376.08" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#333333" text-anchor="start">commitments plus uniqueness arguments.</text>
<text x="242" y="394.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">Example: Icosahedral projection from E8 to Z6 to H3, pending the</text>
<text x="242" y="409.34" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#555555" text-anchor="start">remaining analytic gap.</text>
